name: Collect Best CF IPV4

on:
  schedule:
    - cron: '50 */3 * * *'
  workflow_dispatch:

concurrency:
  group: Collect Best CF IPV4
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  collect-best-cf-ipv4:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r .github/scripts/requirements.txt

      - name: Collect Best CF IPV4
        run: python3 .github/scripts/best-cf-ipv4-collector.py

      - name: Commit update
        run: |
          git config user.name "Lancelot"
          git config user.email "Lancelot@example.com"
          git add best-cf-ipv4.txt
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Update Best CF IPV4 list $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M')"
          git pull --rebase
          git push
